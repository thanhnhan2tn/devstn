global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: pipeline
    metrics_path: /metrics
    static_configs:
      - targets: ["${STUDIO_TAILSCALE_IP}:8001"]

  - job_name: n8n
    metrics_path: /metrics
    static_configs:
      - targets: ["${TAILSCALE_IP}:5678"]

  - job_name: postgres
    static_configs:
      - targets: ["${TAILSCALE_IP}:9187"]

  - job_name: redis
    static_configs:
      - targets: ["${TAILSCALE_IP}:9121"]

alerting:
  alertmanagers: []

rule_files:
  - "alerts.yml"
